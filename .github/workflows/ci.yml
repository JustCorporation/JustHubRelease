name: JustHubRelease validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate update_info.json
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const info = JSON.parse(fs.readFileSync("update_info.json", "utf8"));
          if (!/^\d+\.\d+\.\d+$/.test(info.version)) throw new Error("Invalid version");
          if (!Array.isArray(info.notes)) throw new Error("notes must be an array");
          if (typeof info.downloadUrl !== "string" || !info.downloadUrl.startsWith("http")) throw new Error("Invalid downloadUrl");
          if (!/^[a-f0-9]{64}$/i.test(info.sha256)) throw new Error("Invalid sha256");
          console.log("Manifest structure is valid:", info.version);
          NODE
